<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Radar Console</title>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        /* === UI 修改说明 === */
        /* 新增的分页控制区样式 */
        .pagination {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }
        .pagination button {
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 4px;
            border: 1px solid #ccc;
            background-color: #f8f9fa;
        }
        .pagination button:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }
        .pagination span {
            font-weight: bold;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Audio Radar Console</h1>
            <button id="refreshBtn">Refresh Data</button>
        </header>

        <main>
            <table id="audioTable">
                <thead>
                    <tr>
                        <th>File ID (SnowFlake)</th>
                        <th>Local Path</th>
                        <th>Size (bytes)</th>
                        <th>Generation Time</th>
                        <th>Operation</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="5" class="loading">Waiting for Connection...</td></tr>
                </tbody>
            </table>
            
            <!-- 分页控制面板 -->
            <div class="pagination">
                <button id="prevPageBtn" disabled>Previous Page</button>
                <span id="pageInfo">Page 1 / 1</span>
                <button id="nextPageBtn" disabled>Next Page</button>
            </div>
        </main>
    </div>

    <!-- 挂载带有重构逻辑的 main.js -->
    <script type="module" src="./js/main.js"></script>
</body>
</html>
